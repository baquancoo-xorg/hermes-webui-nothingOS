<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>Hermes</title>
    <script>
      // Áp theme + font-size trước khi React mount — tránh flash sai theme/cỡ chữ.
      try {
        var s = JSON.parse(localStorage.getItem('hermes_v2_settings') || '{}');
        var st = (s && s.state) || {};
        var theme = st.theme || 'dark';
        var skin = st.skin || 'nothing';
        var dark =
          theme === 'dark' ||
          (theme === 'system' &&
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
        if (skin && skin !== 'sienna') document.documentElement.setAttribute('data-skin', skin);
        var FS = { small: '14px', default: '16px', large: '18px', xl: '20px' };
        if (st.font_size && FS[st.font_size]) {
          document.documentElement.style.fontSize = FS[st.font_size];
        }
      } catch (e) {}
    </script>
    <script type="module" crossorigin src="/v2/assets/index-Cgx1ooJL.js"></script>
    <link rel="stylesheet" crossorigin href="/v2/assets/index-BTNotSeL.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
